services:
  - type: web
    name: simple-portfolio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_data.py && gunicorn app:app --bind 0.0.0.0:$PORT
    plan: starter
    disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "10000"
      - key: PORTFOLIOS_DIR
        value: /data/portfolios
