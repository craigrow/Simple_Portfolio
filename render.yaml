services:
  - type: web
    name: simple-portfolio
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_data.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: starter
    disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORTFOLIOS_DIR
        value: /data/portfolios
